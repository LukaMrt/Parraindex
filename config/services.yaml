# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
services:
    _defaults:
        autowire: true
        autoconfigure: true

    _instanceof:
        App\Service\Contact\ContactResolverInterface:
            tags: ['app.contact_resolver']

    App\:
        resource: '%kernel.project_dir%/src/'
        exclude:
            - '%kernel.project_dir%/src/DependencyInjection/'
            - '%kernel.project_dir%/src/Entity/'
            - '%kernel.project_dir%/src/Kernel.php'

    App\Security\LoginSuccessListener:
        tags: [kernel.event_listener]

    App\Service\Contact\ContactResolverManager:
        arguments:
            $resolvers: !tagged_iterator app.contact_resolver

    Symfony\Component\ObjectMapper\ObjectMapper:
        arguments:
            $propertyAccessor: '@property_accessor'

    Symfony\Component\ObjectMapper\ObjectMapperInterface:
        alias: Symfony\Component\ObjectMapper\ObjectMapper
