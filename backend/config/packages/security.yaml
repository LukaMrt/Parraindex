security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Person\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|scripts)/
            security: false
        api:
            pattern: ^/api/
            provider: app_user_provider
            stateless: false
            json_login:
                check_path: api_auth_login
                username_path: email
                success_handler: App\Security\ApiAuthenticationSuccessHandler
                failure_handler: App\Security\ApiAuthenticationFailureHandler

    access_control:
        - { path: ^/api/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
