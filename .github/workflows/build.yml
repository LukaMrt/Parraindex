    backend-migrations:
        name: No pending migrations
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        services:
            mysql:
                image: mysql:9
                env:
                    MYSQL_DATABASE: parraindex_test
                    MYSQL_USER: parraindex
                    MYSQL_PASSWORD: parraindex
                    MYSQL_ROOT_PASSWORD: root
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=3
        steps:
            -   uses: actions/checkout@v3
            -   uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.5'
                    extensions: curl, pdo_mysql, pdo_sqlite, intl
            -   uses: actions/cache@v3
                with:
                    path: backend/vendor
                    key: ${{ runner.os }}-php-${{ hashFiles('backend/composer.lock') }}
                    restore-keys: ${{ runner.os }}-php-
            -   run: composer install --prefer-dist --no-progress --no-scripts
            -   name: Run existing migrations
                run: php bin/console doctrine:migrations:migrate --no-interaction
                env:
                    APP_ENV: dev
                    APP_SECRET: ci-not-for-production
                    DATABASE_HOST: 127.0.0.1
                    DATABASE_PORT: 3306
                    DATABASE_USER: parraindex
                    DATABASE_PASSWORD: parraindex
                    DATABASE_NAME: parraindex_test
                    MAIL_USER: ci@example.com
                    MAIL_PASSWORD: password
                    MAIL_HOST: localhost
                    MAIL_PORT: 587
                    MAIL_NAME: Parraindex
            -   name: Check no pending migrations
                run: |
                    OUTPUT=$(php bin/console make:migration --no-interaction 2>&1)
                    echo "$OUTPUT"
                    echo "$OUTPUT" | grep -q "No database changes" || { echo "ERROR: Pending schema changes detected — run make:migration and commit the result."; exit 1; }
                env:
                    APP_ENV: dev
                    APP_SECRET: ci-not-for-production
                    DATABASE_HOST: 127.0.0.1
                    DATABASE_PORT: 3306
                    DATABASE_USER: parraindex
                    DATABASE_PASSWORD: parraindex
                    DATABASE_NAME: parraindex_test
                    MAIL_USER: ci@example.com
                    MAIL_PASSWORD: password
                    MAIL_HOST: localhost
                    MAIL_PORT: 587
                    MAIL_NAME: Parraindex

    # ── Frontend ───────────────────────────────────────────────────────────────

    frontend-format:
        name: Format
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            -   uses: actions/checkout@v3
            -   uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: frontend/package-lock.json
            -   run: npm ci
            -   run: npm run format:check

    frontend-build:
        name: Build
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            -   uses: actions/checkout@v3
            -   uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: frontend/package-lock.json
            -   run: npm ci
            -   run: npm run build

    frontend-typecheck:
        name: Typecheck
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            -   uses: actions/checkout@v3
            -   uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: frontend/package-lock.json
            -   run: npm ci
            -   run: npm run typecheck

    frontend-lint:
        name: Lint
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            -   uses: actions/checkout@v3
            -   uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: frontend/package-lock.json
            -   run: npm ci
            -   run: npm run lint

