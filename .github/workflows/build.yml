name: Quality

on:
    push:
        branches: [ master, develop ]
    pull_request:
        branches: [ master, develop ]

permissions:
    contents: read

jobs:

    # ── Backend ────────────────────────────────────────────────────────────────

    backend-rector:
        name: Rector
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            -   uses: actions/checkout@v3
            -   uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.5'
                    extensions: curl, pdo_mysql, pdo_sqlite
            -   name: Validate composer.json
                run: composer validate --strict
            -   uses: actions/cache@v3
                with:
                    path: backend/vendor
                    key: ${{ runner.os }}-php-${{ hashFiles('backend/composer.lock') }}
                    restore-keys: ${{ runner.os }}-php-
            -   run: composer install --prefer-dist --no-progress --no-scripts
            -   run: composer rector:dry

    backend-phpstan:
        name: PHPStan
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            -   uses: actions/checkout@v3
            -   uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.5'
                    extensions: curl, pdo_mysql, pdo_sqlite
            -   uses: actions/cache@v3
                with:
                    path: backend/vendor
                    key: ${{ runner.os }}-php-${{ hashFiles('backend/composer.lock') }}
                    restore-keys: ${{ runner.os }}-php-
            -   run: composer install --prefer-dist --no-progress --no-scripts
            -   run: composer phpstan

    backend-phpcs:
        name: PHP-CS
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            -   uses: actions/checkout@v3
            -   uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.5'
                    extensions: curl, pdo_mysql, pdo_sqlite
            -   uses: actions/cache@v3
                with:
                    path: backend/vendor
                    key: ${{ runner.os }}-php-${{ hashFiles('backend/composer.lock') }}
                    restore-keys: ${{ runner.os }}-php-
            -   run: composer install --prefer-dist --no-progress --no-scripts
            -   run: composer phpcs

