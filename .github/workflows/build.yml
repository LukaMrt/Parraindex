    # ── E2E ────────────────────────────────────────────────────────────────────

    e2e-format:
        name: E2E Format
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: e2e
        steps:
            -   uses: actions/checkout@v3
            -   uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: e2e/package-lock.json
            -   run: npm ci
            -   run: npm run format:check

    e2e-lint:
        name: E2E Lint
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: e2e
        steps:
            -   uses: actions/checkout@v3
            -   uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: e2e/package-lock.json
            -   run: npm ci
            -   run: npm run lint

    e2e-typecheck:
        name: E2E Typecheck
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: e2e
        steps:
            -   uses: actions/checkout@v3
            -   uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: e2e/package-lock.json
            -   run: npm ci
            -   run: npm run typecheck

    e2e-tests:
        name: E2E Tests
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v3
            -   name: Create .env file
                run: |
                    cat > .env <<EOF
                    DATABASE_USER=parraindex
                    DATABASE_PASSWORD=parraindex
                    DATABASE_NAME=parraindex
                    APP_SECRET=ci-test-secret-not-for-production
                    MAIL_WEB_PORT=8025
                    MAIL_SMTP_PORT=1025
                    EOF
            -   name: Start Docker stack (test target)
                run: docker compose -f compose.yaml -f compose.e2e.yaml up -d --build
            -   name: Wait for app + mailpit
                run: |
                    timeout 120 bash -c 'until curl -sf http://localhost/ > /dev/null; do sleep 2; done'
                    timeout 30  bash -c 'until curl -sf http://localhost:8025/api/v1/messages > /dev/null; do sleep 2; done'
            -   uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: e2e/package-lock.json
            -   name: Install Playwright + browsers
                working-directory: e2e
                run: |
                    npm ci
                    npx playwright install --with-deps chromium
            -   name: Run E2E tests
                working-directory: e2e
                run: npm test
            -   name: Upload Playwright report
                if: always()
                uses: actions/upload-artifact@v4
                with:
                    name: playwright-report
                    path: e2e/playwright-report/
                    retention-days: 7
            -   name: Dump app logs on failure
                if: failure()
                run: docker compose -f compose.yaml -f compose.e2e.yaml logs app

    # ── Docker ─────────────────────────────────────────────────────────────────

    docker:
        name: Build & Push Docker image
        needs:
            - backend-rector
            - backend-phpstan
            - backend-phpcs
            - backend-migrations
            - frontend-format
            - frontend-build
            - frontend-typecheck
            - frontend-lint
            - e2e-format
            - e2e-lint
            - e2e-typecheck
            - e2e-tests
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v3
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3
            -   name: Log in to Docker Hub
                uses: docker/login-action@v3
                with:
                    username: ${{ secrets.DOCKERHUB_USERNAME }}
                    password: ${{ secrets.DOCKERHUB_PASSWORD }}
            -   name: Build and push
                uses: docker/build-push-action@v6
                with:
                    context: .
                    file: docker/Dockerfile
                    target: prod
                    platforms: linux/arm64
                    push: true
                    tags: |
                        ${{ secrets.DOCKERHUB_USERNAME }}/parraindex:latest
                        ${{ secrets.DOCKERHUB_USERNAME }}/parraindex:${{ github.sha }}
