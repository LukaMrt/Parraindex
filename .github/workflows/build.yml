    # ── Frontend ───────────────────────────────────────────────────────────────

    frontend-format:
        name: Format
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            -   uses: actions/checkout@v3
            -   uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: frontend/package-lock.json
            -   run: npm ci
            -   run: npm run format:check

    frontend-build:
        name: Build
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            -   uses: actions/checkout@v3
            -   uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: frontend/package-lock.json
            -   run: npm ci
            -   run: npm run build

    frontend-typecheck:
        name: Typecheck
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            -   uses: actions/checkout@v3
            -   uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: frontend/package-lock.json
            -   run: npm ci
            -   run: npm run typecheck

    frontend-lint:
        name: Lint
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            -   uses: actions/checkout@v3
            -   uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: frontend/package-lock.json
            -   run: npm ci
            -   run: npm run lint

