name: Quality

on:
    push:
        branches: [ master, develop ]
    pull_request:
        branches: [ master, develop ]

permissions:
    contents: read

jobs:

    code-quality:
        name: Code Quality
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            -   uses: actions/checkout@v3

            -   name: Setup PHP 8.5
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.5'
                    extensions: curl, pdo_mysql, pdo_sqlite

            -   name: Validate composer.json and composer.lock
                run: composer validate --strict

            -   name: Cache Composer packages
                id: composer-cache
                uses: actions/cache@v3
                with:
                    path: backend/vendor
                    key: ${{ runner.os }}-php-${{ hashFiles('backend/composer.lock') }}
                    restore-keys: |
                        ${{ runner.os }}-php-

            -   name: Install dependencies
                run: composer install --prefer-dist --no-progress

            -   name: Run PhpStan
                run: composer phpstan

            -   name: Run Php-CS
                run: composer phpcs

            -   name: Run Rector
                run: composer rector:dry

    tests:
        name: Tests
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            -   uses: actions/checkout@v3

            -   name: Setup PHP 8.5
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.5'
                    extensions: curl, pdo_mysql, pdo_sqlite, sqlite3, bcmath, ctype, date, fileinfo, gd, gmp, iconv, intl, json, mbstring, openssl, pcre, PDO, random, zip, zlib

            -   name: Cache Composer packages
                id: composer-cache
                uses: actions/cache@v3
                with:
                    path: backend/vendor
                    key: ${{ runner.os }}-php-${{ hashFiles('backend/composer.lock') }}
                    restore-keys: |
                        ${{ runner.os }}-php-

            -   name: Install dependencies
                run: composer install --prefer-dist --no-progress

            -   name: Build scss
                run: composer scss:build

            -   name: Create test database schema
                run: php bin/console doctrine:schema:create --env=test

            -   name: Load fixtures
                run: php bin/console doctrine:fixtures:load --no-interaction --env=test

            -   name: Run tests
                run: php bin/phpunit

#      - name: Run mutation tests
#        run: vendor/bin/infection --threads=4 --min-msi=75

    frontend-quality:
        name: Frontend Quality
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            -   uses: actions/checkout@v3

            -   name: Setup Node.js 22
                uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: frontend/package-lock.json

            -   name: Install dependencies
                run: npm ci

            -   name: Typecheck
                run: npm run typecheck

            -   name: Lint
                run: npm run lint

            -   name: Tests
                run: npm test -- --run

    frontend-build:
        name: Frontend Build
        needs: frontend-quality
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            -   uses: actions/checkout@v3

            -   name: Setup Node.js 22
                uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'
                    cache-dependency-path: frontend/package-lock.json

            -   name: Install dependencies
                run: npm ci

            -   name: Build
                run: npm run build

