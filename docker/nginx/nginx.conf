events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Proxy API requests to FrankenPHP
        location /api/ {
            proxy_pass http://frankenphp:80/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin {
            proxy_pass http://frankenphp:80/admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /bundles/ {
            proxy_pass http://frankenphp:80/bundles/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Long-lived cache for Vite hashed assets (JS, CSS, fonts, images)
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # No-cache for index.html so deploys take effect immediately
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # SPA fallback: unknown paths → React Router handles them
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
